<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-shirt Luxe Personnalisable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:"Helvetica Neue", Helvetica, Arial, sans-serif; background:#fff; }

/* NAVBAR */
.navbar-minimal { display:flex; justify-content:space-between; align-items:center; padding:20px 40px; background:#fff; width:100%; position:fixed; top:0; z-index:1000; border-bottom:1px solid #eee; }
.nav-left, .nav-right { display:flex; align-items:center; gap:15px; }
.logo { flex:1; text-align:center; }
.logo img { height:45px; }
.navbar-minimal a { text-decoration:none; color:#000; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; transition:opacity 0.3s; }
.navbar-minimal a:hover { opacity:0.7; }

/* BURGER */
.burger { width:25px; height:18px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; }
.burger span { height:2px; background:#000; transition:0.3s; }
.burger.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
.burger.active span:nth-child(2) { opacity:0; }
.burger.active span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

/* MENU MOBILE */
.mobile-menu { position:fixed; top:0; left:-100%; width:100%; height:100vh; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:30px; transition:left 0.4s; z-index:1500; }
.mobile-menu.active { left:0; }
.mobile-menu .close-menu { position:absolute; top:20px; right:30px; font-size:30px; cursor:pointer; color:#000; }
.mobile-menu a { display:block; padding:15px 40px; text-decoration:none; background:#000; color:#fff; font-weight:bold; text-transform:uppercase; letter-spacing:2px; border-radius:6px; width:70%; text-align:center; transition:0.3s; }
.mobile-menu a:hover { background:#222; }

/* PRODUIT */
.product { position:relative; width:800px; max-width:90%; margin:140px auto 50px; }
.background-image { width:100%; display:block; }
.svg-layer { position:absolute; top:0; left:0; width:100%; height:90%; z-index:1; }
svg { width:100%; height:100%; }
path { transition: fill 0.2s ease, opacity 0.3s; cursor:pointer; }
path.selected { stroke:#000; stroke-width:2; }

/* CUSTOMIZER */
.custom-buttons { display:flex; gap:15px; justify-content:center; margin-top:20px; z-index:100; position:relative; }
.custom-buttons button { padding:10px 20px; border:1px solid #000; background:#fff; color:#000; text-transform:uppercase; letter-spacing:1.5px; font-weight:bold; cursor:pointer; transition:0.3s; }
.custom-buttons button:hover { background:#000; color:#fff; }

#colorCustomizer { display:none; flex-direction:column; align-items:center; margin-top:20px; position:relative; z-index:100; }
.preset-colors { display:flex; gap:10px; margin-top:10px; }
.color-box { width:30px; height:30px; border-radius:4px; cursor:pointer; border:1px solid #000; }
.motif-box { width:80px; height:40px; border-radius:6px; cursor:pointer; border:2px solid #000; background:#fff; color:#000; text-align:center; line-height:40px; font-size:14px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; transition: all 0.3s ease; padding:0; margin:0; }
.motif-box:hover { background:#000; color:#fff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<nav class="navbar-minimal">
    <div class="nav-left"><div class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></div></div>
    <div class="logo"><a href="#"><img src="img/Logo 1.png" alt="MUSA"></a></div>
    <div class="nav-right"><a href="#">RECHERCHER</a><a href="#">PANIER (0)</a></div>
    <div id="mobileMenu" class="mobile-menu">
        <span class="close-menu" onclick="toggleMenu()">×</span>
        <a href="index.html">Page Produit</a>
        <a href="Personalisation.html">Personnalisation</a>
    </div>
</nav>

<div id="mainProduct" class="product">
    <img src="Fichier 2.png" class="background-image" alt="tshirt">
    <div class="svg-layer">
        <!-- Path holographique initial -->
        <svg id="holoSVG" xmlns="http://www.w3.org/2000/svg" viewBox="250 -70 800 1170">
            <defs>
                <linearGradient id="holo-gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
                    <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="8" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <path d="M945.07,544.09c-21.33,30.83-41.23,36.12-64.55,33.29-11.36,55.61-57.06,437.4-57.06,437.4-.01,1.04-27.78,0-27.78,0,1.85-37.83,22.64-390.91,41.25-446.8-40.26-9.02-92.6-14.68-170.34,31.1-1.57.93-3.16,1.88-4.76,2.86-1.6-.98-3.19-1.93-4.76-2.86-80.76-47.56-127.09-41.14-167.92-31.57.05-.01.09-.02.13-.02-.09.02-.2.05-.3.07,20.18-2,42.05,405.89,44.06,447.15,0,0-26.74.38-26.75-.66,0,0-51.91-436.48-57.9-436.4-2.56.04-2.56-.3-.85-.89-25.24,4.01-46.29.08-68.95-32.67-114.96-166.17,5.57-371.81-20.88-516.6-2.43-13.32,58.6-41.65,57.31-14.87-14.01,291-109.74,481.24,64.12,500.95,22.91,2.59-3.12-2.7,141.45.35,17.16.37,26,21.59,41.24,30.97,15.25-9.39,24.09-30.6,41.24-30.97,144.57-3.05,118.54,2.24,141.45-.35,173.86-19.71,78.13-209.95,64.12-500.95-1.29-26.78,59.74,1.55,57.3,14.87-26.44,144.79,94.09,350.43-20.87,516.6Z" fill="url(#holo-gradient4)" filter="url(#glow)" opacity="0.5"/>
        </svg>

        <!-- SVG pour les couleurs -->
        <svg id="colorSVG" viewBox="220 -75 330 1205" style="display:none">
            <g id="c-shape1" transform="translate(25,0) scale(0.94)">
                <path d="M24.77,28.96C49.29,19.56,73.81,10.17,98.33.78c-11.31,65.21.46,129.5-14.61,186-53.22,199.57-9.61,368.45,96.26,368.12l57.65,438.23-142.43-17.28C95.22,801.12-.28,462.52.5,458.61S33.43,41.18,24.77,28.96Z" fill="#ff0000"/>
            </g>
            <g id="c-shape2" transform="translate(230,510) scale(0.91)">
                <path d="M49.1,463.87C48.93,300.33,25.37,154.67,.58,9.96,60.78-1.3,120.28-3.01,175.88,47.52,236.86,5.06,295.66-11.69,351.18,9.96c-23.46,129.32-38.23,284.86-48.52,453.91l-126.78,42.26-126.78-42.26Z" fill="#ff0000"/>
            </g>
            <g id="c-shape3" transform="translate(540,0) scale(0.94)">
                <path d="M213.45,28.96c-24.52-9.39-49.04-18.78-73.57-28.17,11.31,65.21-.46,129.5,14.61,186,53.22,199.57,9.61,368.45-96.26,368.12L.58,993.13l142.43-17.28c-.02-174.73,95.48-513.32,94.7-517.24S204.79,41.18,213.45,28.96Z" fill="#ff0000"/>
            </g>
        </svg>

        <!-- SVG pour les motifs -->
        <svg id="motifSVG" viewBox="220 -75 330 1205" style="display:none">
            <g id="m-shape1" transform="translate(40,0) scale(0.90)">
                <path d="M24.77,28.96C49.29,19.56,73.81,10.17,98.33.78c-11.31,65.21.46,129.5-14.61,186-53.22,199.57-9.61,368.45,96.26,368.12l57.65,438.23-142.43-17.28C95.22,801.12-.28,462.52.5,458.61S33.43,41.18,24.77,28.96Z" fill="#ff0000"/>
            </g>
            <g id="m-shape2" transform="translate(240,485) scale(0.90)">
                <path d="M49.1,463.87C48.93,300.33,25.37,154.67.58,9.96,60.78-1.3,120.28-3.01,175.88,47.52,236.86,5.06,295.66-11.69,351.18,9.96c-23.46,129.32-38.23,284.86-48.52,453.91l-126.78,42.26-126.78-42.26Z" fill="#ff0000"/>
            </g>
            <g id="m-shape3" transform="translate(535,0) scale(0.90)">
                <path d="M213.45,28.96c-24.52-9.39-49.04-18.78-73.57-28.17,11.31,65.21-.46,129.5,14.61,186,53.22,199.57,9.61,368.45-96.26,368.12L.58,993.13l142.43-17.28c-.02-174.73,95.48-513.32,94.7-517.24S204.79,41.18,213.45,28.96Z" fill="#ff0000"/>
            </g>
        </svg>
    </div>

    <div class="custom-buttons">
        <button onclick="toggleCustomizer()">Personnaliser les couleurs</button>
        <button onclick="toggleMotifMode()">Personnaliser les motifs</button>
    </div>

    <div id="colorCustomizer">
        <div id="colorSection">
            <input class="jscolor" value="ff0000">
            <div class="preset-colors">
                <div class="color-box" style="background:red;" onclick="setGeneralColor('#ff0000')"></div>
                <div class="color-box" style="background:blue;" onclick="setGeneralColor('#0000ff')"></div>
                <div class="color-box" style="background:orange;" onclick="setGeneralColor('#ffa500')"></div>
                <div class="color-box" style="background:green;" onclick="setGeneralColor('#008000')"></div>
                <div class="color-box" style="background:yellow;" onclick="setGeneralColor('#ffff00')"></div>
            </div>
        </div>
        <div id="motifSection" style="display:none;">
            <div class="preset-motifs">
                <button class="motif-box" onclick="setMotif(1)">Motif 1</button>
                <button class="motif-box" onclick="setMotif(2)">Motif 2</button>
            </div>
            <div style="margin-top:10px;">
                <input type="file" id="motifInput" accept="image/*" style="margin-bottom:10px;">
                <label for="motifSizeSlider">Taille motif: </label>
                <input type="range" id="motifSizeSlider" min="150" max="600" step="50" value="400" disabled>
            </div>
        </div>
    </div>
</div>

<script src="https://jscolor.com/releases/2.4.5/jscolor.js"></script>
<script>
let selectedPath = null;

// Init JSColor
const picker = new jscolor(document.querySelector('.jscolor'), { onFineChange: 'changeGeneralColor(this)' });

// MENU BURGER
function toggleMenu() {
    document.querySelector('.burger').classList.toggle('active');
    document.getElementById('mobileMenu').classList.toggle('active');
}

function toggleCustomizer() {
    const c = document.getElementById('colorCustomizer');
    const holoSVG = document.getElementById('holoSVG');
    const colorSVG = document.getElementById('colorSVG');
    const motifSVG = document.getElementById('motifSVG');

    if(c.style.display === 'flex') {
        c.style.display = 'none';
        holoSVG.style.display = 'block';
        colorSVG.style.display = 'none';
        motifSVG.style.display = 'none';
        document.querySelectorAll('#colorSVG g').forEach(g => g.classList.remove('selected'));
        selectedPath = null;
        // Reset to gradient
        document.querySelector('#holoSVG path').setAttribute('fill', 'url(#holo-gradient4)');
    } else {
        c.style.display = 'flex';
        holoSVG.style.display = 'none';
        colorSVG.style.display = 'block';
        motifSVG.style.display = 'none';
        document.getElementById('colorSection').style.display = 'block';
        document.getElementById('motifSection').style.display = 'none';
    }
}

function toggleMotifMode() {
    const c = document.getElementById('colorCustomizer');
    const holoSVG = document.getElementById('holoSVG');
    const colorSVG = document.getElementById('colorSVG');
    const motifSVG = document.getElementById('motifSVG');

    if(c.style.display === 'flex') {
        // Hide motif mode
        c.style.display = 'none';
        holoSVG.style.display = 'block';
        colorSVG.style.display = 'none';
        motifSVG.style.display = 'none';
        document.getElementById('motifSizeSlider').disabled = true;
        selectedPath = null;
        document.getElementById('motifSection').style.display = 'none';
        document.getElementById('colorSection').style.display = 'block';
        // Reset to gradient
        document.querySelector('#holoSVG path').setAttribute('fill', 'url(#holo-gradient4)');
    } else {
        // Show motif mode
        c.style.display = 'flex';
        holoSVG.style.display = 'none';
        colorSVG.style.display = 'none';
        motifSVG.style.display = 'block';
        document.getElementById('colorSection').style.display = 'none';
        document.getElementById('motifSection').style.display = 'block';
    }
}

// SÉLECTION DES SHAPES - COULEUR
document.querySelectorAll('#colorSVG g').forEach(g => {
    g.addEventListener('click', () => {
        if (selectedPath === g) {
            // Deselect
            selectedPath.classList.remove('selected');
            selectedPath = null;
        } else {
            // Select new
            if(selectedPath) selectedPath.classList.remove('selected');
            selectedPath = g;
            selectedPath.classList.add('selected');
            picker.fromString(g.querySelector('path').getAttribute('fill'));
        }
    });
});

// SÉLECTION DES SHAPES - MOTIF
document.querySelectorAll('#motifSVG g').forEach(g => {
    g.addEventListener('click', () => {
        if (selectedPath === g) {
            // Deselect
            selectedPath.classList.remove('selected');
            selectedPath = null;
        } else {
            // Select new
            if(selectedPath) selectedPath.classList.remove('selected');
            selectedPath = g;
            selectedPath.classList.add('selected');
        }
    });
});

// MOTIF
document.getElementById('motifInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const dataUrl = event.target.result;
            applyMotifFill(dataUrl);
        };
        reader.readAsDataURL(file);
    }
});

function applyMotifFill(src) {
    const svg = document.getElementById('motifSVG');
    let defs = svg.querySelector('defs');
    if (!defs) {
        defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        svg.insertBefore(defs, svg.firstChild);
    }
    let pattern = defs.querySelector('#motifPattern');
    if (!pattern) {
        pattern = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
        pattern.id = 'motifPattern';
        pattern.setAttribute('patternUnits', 'userSpaceOnUse');
        defs.appendChild(pattern);
    }
    pattern.innerHTML = `<image href="${src}" width="400" height="400"/>`;
    pattern.setAttribute('width', '400');
    pattern.setAttribute('height', '400');

    if (selectedPath) {
        selectedPath.querySelector('path').setAttribute('fill', 'url(#motifPattern)');
    } else {
        document.querySelectorAll('#motifSVG path').forEach(path => path.setAttribute('fill', 'url(#motifPattern)'));
    }

    // Enable size slider
    document.getElementById('motifSizeSlider').disabled = false;
    document.getElementById('motifSizeSlider').value = 400;
}

document.getElementById('motifSizeSlider').addEventListener('input', (e) => {
    const size = e.target.value;
    const pattern = document.getElementById('motifPattern');
    if (pattern) {
        pattern.setAttribute('width', size);
        pattern.setAttribute('height', size);
        pattern.querySelector('image').setAttribute('width', size);
        pattern.querySelector('image').setAttribute('height', size);
    }
});

// MOTIF PRÉDÉFINI
function setMotif(num) {
    const imgName = num === 1 ? 'Motif 1.png' : 'Motif 2.png';
    const src = `img/${encodeURIComponent(imgName)}`;
    applyMotifFill(src);
}

// CHANGEMENT DE COULEUR
function changeGeneralColor(p) {
    const color = p.toHEXString();
    if(selectedPath) selectedPath.querySelector('path').setAttribute('fill', color);
    else document.querySelectorAll('#colorSVG path').forEach(path => path.setAttribute('fill', color));
}

// PRÉDÉFINI
function setGeneralColor(color) {
    if(selectedPath) selectedPath.querySelector('path').setAttribute('fill', color);
    else document.querySelectorAll('#colorSVG path').forEach(path => path.setAttribute('fill', color));
    picker.fromString(color);
}

// EFFET HOLOGRAPHIQUE INTERACTIF
const product = document.getElementById('mainProduct');
const gradient = document.getElementById('holo-gradient4');

product.addEventListener('mousemove', (e) => {
    const rect = product.getBoundingClientRect();
    const mouseX = ((e.clientX - rect.left) / rect.width) * 100;
    const mouseY = ((e.clientY - rect.top) / rect.height) * 100;
    gradient.setAttribute('x1', mouseX + '%');
    gradient.setAttribute('y1', mouseY + '%');
    gradient.setAttribute('x2', (mouseX + 20) + '%');
    gradient.setAttribute('y2', (mouseY + 20) + '%');
});
</script>
</body>
</html>
